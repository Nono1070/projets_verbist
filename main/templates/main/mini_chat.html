{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Mini-Chat Communautaire</h5>
                </div>
                
                <!-- Zone des messages -->
                <div class="card-body" style="height: 400px; overflow-y: auto; background-color: #f8f9fa;">
                    {% for msg in messages_chat %}
                        <div class="mb-3 {% if msg.auteur == user %}text-end{% endif %}">
                            <div class="d-inline-block p-2 rounded shadow-sm 
                                {% if msg.auteur == user %}bg-primary text-white{% else %}bg-white{% endif %}" 
                                style="max-width: 80%;">
                                
                                <small class="d-block fw-bold" style="font-size: 0.7rem;">
                                    {{ msg.auteur.username }}
                                </small>
                                <span>{{ msg.message }}</span>
                                <small class="d-block mt-1 opacity-75" style="font-size: 0.6rem;">
                                    {{ msg.date_envoi|date:"H:i" }}
                                </small>
                            </div>
                        </div>
                    {% empty %}
                        <p class="text-center text-muted">Aucun message. Lancez la discussion !</p>
                    {% endfor %}
                </div>

                <!-- Formulaire d'envoi -->
                <div class="card-footer">
                    <form method="POST" class="d-flex">
                        {% csrf_token %}
                        <input type="text" name="message" class="form-control me-2" placeholder="Votre message..." required maxlength="255">
                        <button type="submit" class="btn btn-primary">Envoyer</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
